<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Sandra Maeso</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e4e6f1;
      min-height: 100vh;
      padding: 60px 30px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: #8a84ff;
    }

    header p {
      margin-top: 10px;
      color: #7b82a6;
      font-size: 1rem;
    }

    .proyectos {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2e3354;
      border-radius: 16px;
      padding: 30px;
      width: 280px;
      transition: transform 0.25s ease, border-color 0.25s ease;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: #6c63ff;
    }

    .card .icon { font-size: 2rem; margin-bottom: 16px; }
    .card h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 8px; }
    .card p { font-size: 0.9rem; color: #7b82a6; line-height: 1.5; }

    .badge {
      display: inline-block;
      margin-top: 16px;
      background: rgba(108,99,255,0.18);
      color: #8a84ff;
      border-radius: 99px;
      padding: 3px 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <header>
    <h1>Portfolio</h1>
    <p>Sandra Maeso Aguilera — Desarrollo de aplicaciones</p>
  </header>

  <div class="proyectos">

    <a class="card" href="maquetacion-app/index.html">
      <div class="icon">✦</div>
      <h2>TaskFlow</h2>
      <p>App de gestión de tareas con HTML, CSS y diseño responsive.</p>
      <span class="badge">HTML · CSS</span>
    </a>

    <!-- Aquí irán los siguientes proyectos -->

  </div>

</body>
</html>
