<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Sandra Maeso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    .task-card.saliendo { opacity: 0; transform: translateX(20px); transition: opacity .3s, transform .3s; }
    .btn-eliminar { opacity: 0; transition: opacity 0.2s; }
    .task-card:hover .btn-eliminar { opacity: 1; }
    .task-card {
      background: rgb(17 24 39);
      border: 1px solid rgb(31 41 55);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .task-card:hover {
      border-color: rgb(126 34 206);
      background: rgb(31 41 55);
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.35);
    }
    .task-card.done {
      opacity: 0.5;
      border-color: rgb(52 211 153);
      background: rgba(52,211,153,0.05);
    }
    .task-card.done .task-title { text-decoration: line-through; color: rgb(107 114 128); }
    .task-row { display: flex; align-items: center; gap: 0.75rem; }
    .task-check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid rgb(55 65 81); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .task-card.done .task-check { background: rgb(52 211 153); border-color: rgb(52 211 153); }
    .task-title { flex: 1; font-weight: 500; font-size: 0.95rem; }
    .btn-eliminar { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 2px 4px; }
  </style>
</head>

<body class="bg-gray-950 text-gray-300 min-h-screen grid grid-rows-[auto_1fr]">

  <!-- HEADER -->
  <header class="bg-gray-900 border-b border-gray-800 px-8 py-3 flex items-center justify-between sticky top-0 z-50">
    <div class="text-lg font-bold text-purple-300">Task<span class="font-normal text-gray-500">Flow</span></div>

    <div class="flex items-center gap-3">
      <div class="relative">
        <span class="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-500 text-sm">🔍</span>
        <input
          type="text"
          id="input-buscar"
          placeholder="Buscar tarea…"
          class="bg-gray-800 border border-gray-700 rounded-lg pl-8 pr-3 py-1.5 text-sm text-gray-300 placeholder-gray-600 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition duration-200 w-56"
        />
      </div>

      <button
        id="btn-tema"
        class="text-lg px-2.5 py-1 rounded-lg border border-gray-700 hover:border-purple-400 hover:text-purple-300 focus:outline-none focus:ring-2 focus:ring-purple-500 transition duration-200"
        title="Alternar modo oscuro"
      >🌙</button>

      <button
        id="btn-nueva-tarea"
        class="bg-purple-700 hover:bg-purple-500 active:scale-95 text-white text-sm font-semibold px-4 py-1.5 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 transition duration-200"
      >+ Nueva tarea</button>

      <div class="w-9 h-9 rounded-full bg-gradient-to-br from-purple-600 to-pink-500 flex items-center justify-center font-bold text-xs text-white cursor-pointer select-none">SM</div>
    </div>
  </header>

  <!-- LAYOUT -->
  <div class="flex min-h-0">

    <!-- SIDEBAR -->
    <aside class="w-56 flex-shrink-0 bg-gray-900 border-r border-gray-800 p-5 flex flex-col gap-6">
      <div>
        <h3 class="text-xs text-gray-500 uppercase tracking-widest mb-3">Vistas</h3>
        <div class="flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer text-sm text-purple-300 bg-gray-800 mb-1 transition duration-200 hover:bg-gray-700">
          <span>📋</span> Todas
          <span id="count-todas" class="ml-auto bg-gray-700 text-gray-400 text-xs rounded-full px-2 py-0.5">0</span>
        </div>
        <div class="flex items-center gap-2 px-3 py-2 rounded-lg cursor-pointer text-sm text-gray-400 transition duration-200 hover:bg-gray-800 hover:text-gray-200">
          <span>✅</span> Completadas
          <span id="count-completadas" class="ml-auto bg-gray-800 text-gray-500 text-xs rounded-full px-2 py-0.5">0</span>
        </div>
      </div>

      <div>
        <h3 class="text-xs text-gray-500 uppercase tracking-widest mb-3">Progreso</h3>
        <div class="flex justify-between text-xs text-gray-500 mb-1.5">
          <span>Completadas</span>
          <span id="pct-label">0%</span>
        </div>
        <div class="h-1.5 rounded-full bg-gray-800 overflow-hidden">
          <div id="progress-fill" class="h-full rounded-full bg-gradient-to-r from-purple-600 to-emerald-400 transition-all duration-500" style="width:0%"></div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-8 overflow-y-auto">

      <div class="flex items-center justify-between mb-8 flex-wrap gap-3">
        <h1 class="text-2xl font-bold">Mis <span class="text-purple-300">Tareas</span></h1>
        <div class="flex gap-1 bg-gray-900 border border-gray-800 rounded-lg p-1">
          <button data-filter="todas"       class="tab px-3 py-1 rounded-md text-xs font-medium bg-purple-700 text-white transition duration-200">Todas</button>
          <button data-filter="pendientes"  class="tab px-3 py-1 rounded-md text-xs font-medium text-gray-400 hover:text-gray-200 transition duration-200">Pendientes</button>
          <button data-filter="completadas" class="tab px-3 py-1 rounded-md text-xs font-medium text-gray-400 hover:text-gray-200 transition duration-200">Completadas</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="flex gap-4 mb-8 flex-wrap">
        <div class="flex-1 min-w-[100px] bg-gray-900 border border-gray-800 rounded-xl p-4 flex flex-col gap-1 hover:-translate-y-1 transition duration-200">
          <span class="text-xl">📝</span>
          <span id="stat-total" class="text-3xl font-bold">0</span>
          <span class="text-xs text-gray-500">Total</span>
        </div>
        <div class="flex-1 min-w-[100px] bg-gray-900 border border-gray-800 rounded-xl p-4 flex flex-col gap-1 hover:-translate-y-1 transition duration-200">
          <span class="text-xl">⏳</span>
          <span id="stat-pendientes" class="text-3xl font-bold">0</span>
          <span class="text-xs text-gray-500">Pendientes</span>
        </div>
        <div class="flex-1 min-w-[100px] bg-gray-900 border border-gray-800 rounded-xl p-4 flex flex-col gap-1 hover:-translate-y-1 transition duration-200">
          <span class="text-xl">✅</span>
          <span id="stat-completadas" class="text-3xl font-bold">0</span>
          <span class="text-xs text-gray-500">Completadas</span>
        </div>
      </div>

      <!-- Pendientes -->
      <div id="section-pendientes" class="mb-8">
        <h2 class="text-base font-semibold mb-4 flex items-center gap-2">
          Pendientes
          <span id="badge-pendientes" class="bg-gray-800 text-gray-400 text-xs rounded-full px-2.5 py-0.5 font-normal">0</span>
        </h2>
        <ul id="lista-pendientes">
          <li id="empty-pendientes" class="text-center py-8 text-gray-600">
            <span class="text-3xl block mb-2">🎉</span>¡Sin tareas pendientes!
          </li>
        </ul>
      </div>

      <!-- Completadas -->
      <div id="section-completadas">
        <h2 class="text-base font-semibold mb-4 flex items-center gap-2">
          Completadas
          <span id="badge-completadas" class="bg-gray-800 text-gray-400 text-xs rounded-full px-2.5 py-0.5 font-normal">0</span>
        </h2>
        <ul id="lista-completadas">
          <li id="empty-completadas" class="text-center py-8 text-gray-600">
            <span class="text-3xl block mb-2">📭</span>Nada completado aún.
          </li>
        </ul>
      </div>

    </main>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[200]">
    <div class="bg-gray-900 border border-gray-700 rounded-xl p-8 w-[min(420px,92vw)] shadow-2xl">
      <h3 class="text-lg font-bold text-purple-300 mb-5">Nueva tarea</h3>
      <input
        type="text"
        id="input-tarea"
        placeholder="¿Qué tienes que hacer?"
        maxlength="140"
        class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-sm text-gray-200 placeholder-gray-600 mb-5 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition duration-200"
      />
      <div class="flex gap-3 justify-end">
        <button
          id="btn-cancelar"
          class="bg-transparent border border-gray-700 text-gray-400 text-sm px-4 py-2 rounded-lg hover:border-gray-400 hover:text-gray-200 focus:outline-none focus:ring-2 focus:ring-gray-500 transition duration-200"
        >Cancelar</button>
        <button
          id="btn-anadir"
          class="bg-purple-700 hover:bg-purple-500 active:scale-95 text-white text-sm font-semibold px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-400 transition duration-200"
        >Añadir tarea</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>

  <script>
    const progressFill = document.getElementById("progress-fill");
    const pctLabel     = document.getElementById("pct-label");
    const statPend     = document.getElementById("stat-pendientes");

    const _orig = actualizarContadores;
    actualizarContadores = function() {
      _orig();
      const total       = tareas.length;
      const completadas = tareas.filter(t => t.completada).length;
      const pct         = total > 0 ? Math.round((completadas / total) * 100) : 0;
      if (progressFill) progressFill.style.width = pct + "%";
      if (pctLabel)     pctLabel.textContent      = pct + "%";
      if (statPend)     statPend.textContent       = total - completadas;
      toggleEmpty("lista-pendientes",  "empty-pendientes");
      toggleEmpty("lista-completadas", "empty-completadas");
    };

    function toggleEmpty(listaId, emptyId) {
      const lista = document.getElementById(listaId);
      const empty = document.getElementById(emptyId);
      if (!lista || !empty) return;
      empty.style.display = lista.querySelectorAll(".task-card").length > 0 ? "none" : "";
    }

    // Filtros
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => {
          t.classList.remove("bg-purple-700", "text-white");
          t.classList.add("text-gray-400");
        });
        tab.classList.add("bg-purple-700", "text-white");
        tab.classList.remove("text-gray-400");
        const filter = tab.dataset.filter;
        document.getElementById("section-pendientes").style.display  = filter === "completadas" ? "none" : "";
        document.getElementById("section-completadas").style.display = filter === "pendientes"  ? "none" : "";
      });
    });

    // Modo oscuro
    const btnTema = document.getElementById("btn-tema");
    btnTema.addEventListener("click", () => {
      document.documentElement.classList.toggle("dark");
      btnTema.textContent = document.documentElement.classList.contains("dark") ? "🌙" : "☀️";
    });

    actualizarContadores();
  </script>
</body>
</html>
